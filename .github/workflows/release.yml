name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_ext: "{exe,msi}"
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_ext: "{deb,AppImage}"
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle_ext: "dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux: dependencias de sistema
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf perl

      # macOS: Perl ya viene instalado

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Vault Local ${{ github.ref_name }}"
          releaseBody: "See the [full changelog](https://github.com/od1n/vault-local/commits/${{ github.ref_name }})"
          releaseDraft: false
          prerelease: false
